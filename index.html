<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Todos</title>
  </head>
  <body
    class="flex flex-col m-0 justify-center items-center min-w-320px min-h-screen"
  >
    <h1 class="text-5xl my-8">To-Do List</h1>
    <section
      class="container flex flex-col lg:flex-row max-w-7xl mt-0 mb-10 mx-auto gap-4 w-full px-5"
    >
      <!-- Formulär -->
      <form
        id="form"
        class="flex flex-col gap-0.3 bg-form p-8 rounded-lg w-full lg:w-1/3"
      >
        <h2 class="text-2xl md:text-4xl mb-4">Add new task</h2>

        <label for="title">Task title:</label>
        <input type="text" name="title" id="title" placeholder="Task title" />

        <label for="deadline">Deadline:</label>
        <input type="date" name="deadline" id="deadline" />

        <label for="select-priority">Select priority-level:</label>
        <select name="select-priority" id="select-priority">
          <option value="High Priority" id="high">High Priority</option>
          <option value="Medium Priority" id="medium">Medium Priority</option>
          <option value="Low Priority" id="low">Low Priority</option>
        </select>

        <button
          type="submit"
          value="Submit"
          id="addTaskButton"
          class="bg-zinc-800 hover:bg-button-hover text-white border-2 border-transparent hover:border-button-border-hover mt-4 py-2 px-4 rounded-md cursor-pointer duration-200"
        >
          Add task
        </button>
      </form>

      <!-- sektion för både to-do listan och avklarade uppgifter -->
      <div class="flex flex-col md:flex-row gap-4 w-full">
        <!-- to-do listan -->
        <section id="to-do" class="w-full md:w-1/2 lg:w-1/2">
          <div class="flex flex-row justify-between items-center mb-4">
            <h2 class="text-2xl md:text-4xl">To-Do List</h2>
            <div class="flex flex-row gap-3 items-center">
              <!-- Behållare för prioriteringsknappen -->
              <div class="relative group">
                <!-- Ikon -->
                <button
                  id="by-priority-btn"
                  type="button"
                  class="fa-solid fa-list-ol text-2xl cursor-pointer hover:text-blue-300"
                  aria-describedby="priority-tooltip"
                ></button>

                <!-- Tooltip behållare -->
                <div
                  id="priority-tooltip"
                  role="tooltip"
                  class="absolute left-1/2 -translate-x-1/2 bottom-full mb-2 hidden group-hover:block w-max bg-black text-white text-base rounded px-3 py-2"
                >
                  Sort by priority

                  <!-- Pil nedåt -->
                  <div
                    class="absolute left-1/2 -translate-x-1/2 top-full h-0 w-0 border-l-4 border-r-4 border-t-4 border-l-transparent border-r-transparent border-t-black"
                  ></div>
                </div>
              </div>

              <!-- Behållare för datumknappen -->
              <div class="relative group">
                <!-- Ikon -->
                <button
                  id="by-date-btn"
                  type="button"
                  class="fa-solid fa-calendar-days text-2xl cursor-pointer hover:text-blue-300"
                  aria-describedby="date-tooltip"
                ></button>

                <!-- Tooltip behållare -->
                <div
                  id="date-tooltip"
                  role="tooltip"
                  class="absolute left-1/2 -translate-x-1/2 bottom-full mb-2 hidden group-hover:block w-max bg-black text-white text-base rounded px-3 py-2"
                >
                  Sort by date

                  <!-- Pil nedåt -->
                  <div
                    class="absolute left-1/2 -translate-x-1/2 top-full h-0 w-0 border-l-4 border-r-4 border-t-4 border-l-transparent border-r-transparent border-t-black"
                  ></div>
                </div>
              </div>

              <!-- Behållare för knappen att sortera alfabetiskt -->
              <div class="relative group">
                <!-- Ikon -->
                <button
                  id="by-alphabet-btn"
                  type="button"
                  class="fa-solid fa-arrow-up-a-z text-2xl cursor-pointer hover:text-blue-300"
                  aria-describedby="title-tooltip"
                ></button>

                <!-- Tooltip behållare -->
                <div
                  id="title-tooltip"
                  role="tooltip"
                  class="absolute left-1/2 -translate-x-1/2 bottom-full mb-2 hidden group-hover:block w-max bg-black text-white text-base rounded px-3 py-2"
                >
                  Sort by title

                  <!-- Pil nedåt -->
                  <div
                    class="absolute left-1/2 -translate-x-1/2 top-full h-0 w-0 border-l-4 border-r-4 border-t-4 border-l-transparent border-r-transparent border-t-black"
                  ></div>
                </div>
              </div>
            </div>
          </div>
          <ul id="to-do-container"></ul>
        </section>

        <!-- avklarade uppgifter listan -->
        <section id="finished-tasks" class="w-full md:w-1/2 lg:w-1/2">
          <div class="flex flex-row justify-between items-center mb-4">
            <h2 class="text-2xl md:text-4xl">Finished Tasks</h2>
          </div>
          <ul id="finished-tasks-container"></ul>
        </section>
      </div>
    </section>

    <script
      src="https://kit.fontawesome.com/b2d9bcb346.js"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
